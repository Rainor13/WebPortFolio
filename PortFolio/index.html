<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Hamburguesa HTML</title>
  <link rel="stylesheet" href="css/Style.css">
  <!--  GSAP  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://assets.codepen.io/16327/ScrambleTextPlugin3.min.js"></script>
  <!--  Scrable  -->
  <script src="https://unpkg.com/@ignatiusmb/scramble@3.0.1/lib/scramble.min.js"></script>
  <!--   Anime   -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>

  <!--   Fuente Google   -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39+Text&family=Orbitron&display=swap" rel="stylesheet">
</head>

<script>
  document.getElementsByTagName("html")[0].classList.add('js');
</script>

<body>

<!-- Pantalla de carga -->
<div id="loader" class="begin-complete-demo">
  <div class="el">Pollazo</div>
  <div id="percentage" style="top: 60%;"></div>
  <div id="loader-text"></div>

</div>

<!-- Contenido principal -->
<div id="content" style="display: none;">

  <h1>This is a heading</h1>
  <p>This is a paragraph</p>
  <p>This is another paragraph</p>

  <!-- Burguer menu -->
  <div class="menu-toggle">
<!--    <button id="boton-hamburguesa">-->
<!--      <span>&#9776;</span> Menú-->
<!--    </button>-->
    <button class="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
<!--      <span>&#9776;</span> Menú-->
    </button>

    <nav id="menu-toggle" style="display: none">
      <ul>
        <li><a href="#inicio">Inicio</a></li>
        <li><a href="#acerca">Acerca de</a></li>
        <li><a href="#servicios">Servicios</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
    </nav>
  </div>

  <!-- intro content -->
  <div class="intro-container">
    <div class="intro-initials center-xy">
      <span>SC</span>
    </div>
    <div class="intro-title center-xy">
      <span>Web Design &amp; Development.</span>
    </div>

    <div class="texto-prueba">
      <span>NURAI nunarasN NURIA.</span>
    </div>

    <!-- arrow -->
    <a href="#section-about">
      <div class="intro-arrow-container">
        <div class="intro-arrow">
          <span class="intro-arrow--line"></span>
          <span class="intro-arrow--tip intro-arrow--tip-right"></span>
          <span class="intro-arrow--tip intro-arrow--tip-left"></span>
        </div>
      </div>
    </a>
  </div>

  <!-- Slideshow container -->
  <div class="slideshow-container">

    <!-- Full-width images with number and caption text -->
    <div class="mySlides fade">
      <div class="numbertext">1 / 3</div>
      <img src="img/img1.jpg" style="width:100%">
      <div class="text">Caption Text</div>
    </div>

    <div class="mySlides fade">
      <div class="numbertext">2 / 3</div>
      <img src="img/img2.jpg" style="width:100%">
      <div class="text">Caption Two</div>
    </div>

    <div class="mySlides fade">
      <div class="numbertext">3 / 3</div>
      <img src="img/img3.jpg" style="width:100%">
      <div class="text">Caption Three</div>
    </div>

    <!-- Next and previous buttons -->
    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
    <a class="next" onclick="plusSlides(1)">&#10095;</a>
  </div>
  <br>

  <!-- The dots/circles -->
  <div class="dots-circles">
    <div style="text-align:center">
      <span class="dot" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
      <span class="dot" onclick="currentSlide(3)"></span>
    </div>
  </div>
</div>

  <!--  GSAP  -->
<!--  <script src="js/gsap.min.js"></script>-->
  <script type="module" src="js/app.js"></script>

</body>
</html>
